<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Loading...</title>
    <script>
      // GitHub Pages SPA routing fix
      // This file catches 404 errors and redirects to index.html
      // The path is stored and restored so Vue Router can handle it
      (function() {
        const pathname = window.location.pathname;
        const redirect = pathname + window.location.search + window.location.hash;
        
        // Store the intended path for index.html to use
        sessionStorage.redirect = redirect;
        
        // Redirect to index.html so it loads and can handle the route
        window.location.href = '/client2/';
      })();
    </script>
  </head>
  <body>
  </body>
</html>
